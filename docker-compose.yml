services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reusable_kyc}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reusable_kyc}"]
      interval: 5s
      timeout: 5s
      retries: 5
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: -anvil 
              - --host
              - 0.0.0.0
              ---port
              - "8545"

    ports:
      - "8545:8545"
    

  web:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL}
      ROLE_MANAGER_ADDRESS: ${ROLE_MANAGER_ADDRESS}
      KYC_REGISTRY_ADDRESS: ${KYC_REGISTRY_ADDRESS}
      CHAIN_ID: ${CHAIN_ID}
    depends_on:
      db:
        condition: service_healthy
      anvil:
        condition: service_started
    volumes:
      - ./backend:/app
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 3 --reload

    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - web

volumes:
  postgres_data:
  frontend_node_modules:
