services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reusable_kyc}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reusable_kyc}"]
      interval: 5s
      timeout: 5s
      retries: 5
  ganache:
    image: trufflesuite/ganache-cli:latest
    ports:
      - "8545:8545"
    command: ganache-cli -h 0.0.0.0 --deterministic

  web:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      BLOCKCHAIN_RPC_URL: http://ganache:8545
    depends_on:
      db:
        condition: service_healthy
      ganache:
        condition: service_started
    volumes:
      - ./backend:/app
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - web

volumes:
  postgres_data:
  frontend_node_modules:
